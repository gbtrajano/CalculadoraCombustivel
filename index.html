<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Combustível</title>

    <link rel="shortcut icon" href="fuel.png" type="image/x-icon" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
      .result-card {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen py-12 px-4"
  >
    <div class="max-w-lg mx-auto">
      <!-- Cabeçalho -->
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800">
          Calculadora de Combustível
        </h1>
        <p class="text-gray-600 mt-2">
          Descubra quanto vai gastar na sua viagem
        </p>
      </div>

      <!-- Card Principal -->
      <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
        <div class="space-y-8">
          <!-- Distância -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Distância da viagem</label
            >
            <div class="relative">
              <input
                type="number"
                id="distance"
                placeholder="0"
                class="w-full px-6 py-5 text-3xl font-medium border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none transition-all"
              />
              <span
                class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 font-medium text-xl"
                >km</span
              >
            </div>
          </div>

          <!-- Ida e Volta -->
          <div class="flex items-center gap-3 bg-gray-50 p-4 rounded-2xl">
            <input
              type="checkbox"
              id="roundTrip"
              class="w-6 h-6 accent-emerald-600 cursor-pointer"
            />
            <label
              for="roundTrip"
              class="text-lg font-medium text-gray-700 cursor-pointer select-none"
            >
              Ida e Volta
            </label>
          </div>

          <!-- Consumo do Veículo -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Consumo médio do veículo</label
            >
            <div class="relative">
              <input
                type="number"
                id="consumption"
                step="0.1"
                placeholder="0.0"
                class="w-full px-6 py-5 text-3xl font-medium border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none transition-all"
              />
              <span
                class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 font-medium text-xl"
                >km/L</span
              >
            </div>
          </div>

          <!-- Preço da Gasolina - CORRIGIDO -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Preço atual da gasolina</label
            >
            <div class="relative">
              <div
                class="absolute left-6 top-1/2 -translate-y-1/2 text-3xl font-medium text-gray-500 pointer-events-none"
              >
                R$
              </div>
              <input
                type="text"
                id="price"
                placeholder="0,00"
                maxlength="10"
                class="w-full pl-16 pr-6 py-5 text-3xl font-medium border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none transition-all"
              />
            </div>
          </div>
        </div>

        <!-- Botões -->
        <div class="grid grid-cols-2 gap-4 mt-10">
          <button
            onclick="calculateFuel()"
            class="bg-emerald-600 hover:bg-emerald-700 transition-all text-white font-semibold text-xl py-6 rounded-2xl shadow-lg active:scale-95"
          >
            Calcular
          </button>

          <button
            onclick="resetForm()"
            class="bg-gray-100 hover:bg-gray-200 transition-all text-gray-700 font-semibold text-xl py-6 rounded-2xl"
          >
            Limpar
          </button>
        </div>
      </div>

      <!-- Área de Resultado -->
      <div
        id="result"
        class="hidden mt-8 result-card bg-white rounded-3xl shadow-2xl p-8 md:p-10"
      >
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-2xl font-bold text-gray-800">Resultado da Viagem</h2>
          <button
            onclick="closeResult()"
            class="text-3xl text-gray-400 hover:text-gray-600 transition-colors"
          >
            ✕
          </button>
        </div>

        <div class="space-y-6">
          <div class="flex justify-between items-center py-4 border-b">
            <span class="text-gray-600 text-lg">Distância total</span>
            <span
              id="totalDistance"
              class="text-2xl font-semibold text-gray-800"
            ></span>
          </div>

          <div class="flex justify-between items-center py-4 border-b">
            <span class="text-gray-600 text-lg">Litros necessários</span>
            <span
              id="liters"
              class="text-2xl font-semibold text-gray-800"
            ></span>
          </div>

          <div class="flex justify-between items-center py-4 border-b">
            <span class="text-gray-600 text-lg">Valor total</span>
            <span
              id="totalCost"
              class="text-3xl font-bold text-emerald-600"
            ></span>
          </div>
        </div>

        <div class="mt-10 text-center">
          <p class="text-sm text-gray-500">
            Estimativa baseada nos dados informados
          </p>
        </div>
      </div>
    </div>

    <script>
      function calculateFuel() {
        const distance = parseFloat(document.getElementById("distance").value);
        const consumption = parseFloat(
          document.getElementById("consumption").value,
        );
        let priceStr = document
          .getElementById("price")
          .value.replace(",", ".")
          .replace("R$", "")
          .trim();
        const price = parseFloat(priceStr);
        const isRoundTrip = document.getElementById("roundTrip").checked;

        if (
          !distance ||
          !consumption ||
          isNaN(price) ||
          price <= 0 ||
          consumption <= 0
        ) {
          alert("Por favor, preencha todos os campos corretamente.");
          return;
        }

        let finalDistance = isRoundTrip ? distance * 2 : distance;
        const litersNeeded = finalDistance / consumption;
        const totalCost = litersNeeded * price;

        document.getElementById("totalDistance").textContent =
          `${finalDistance.toFixed(1)} km`;
        document.getElementById("liters").textContent =
          `${litersNeeded.toFixed(2)} L`;
        document.getElementById("totalCost").textContent =
          `R$ ${totalCost.toFixed(2)}`;

        document.getElementById("result").classList.remove("hidden");
        document
          .getElementById("result")
          .scrollIntoView({ behavior: "smooth" });
      }

      function resetForm() {
        document.getElementById("distance").value = "";
        document.getElementById("consumption").value = "";
        document.getElementById("price").value = "";
        document.getElementById("roundTrip").checked = false;
        document.getElementById("result").classList.add("hidden");
      }

      function closeResult() {
        document.getElementById("result").classList.add("hidden");
      }

      // Formatação automática do preço (com vírgula)
      document.getElementById("price").addEventListener("input", function (e) {
        let value = e.target.value.replace(/\D/g, "");
        if (value.length > 0) {
          if (value.length <= 2) {
            e.target.value = value;
          } else {
            e.target.value = value.slice(0, -2) + "," + value.slice(-2);
          }
        } else {
          e.target.value = "";
        }
      });

      // Calcular com Enter
      document.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          calculateFuel();
        }
      });
    </script>
  </body>
</html>
