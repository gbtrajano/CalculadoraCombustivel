<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="SRC/fuel.png" type="image/x-icon" />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts (Poppins + Roboto Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;family=Roboto+Mono:ital,wght@0,100..700;1,100..700&amp;display=swap"
      rel="stylesheet"
    />

    <title>Calculadora de Combustível</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;family=Roboto+Mono:ital,wght@0,100..700;1,100..700&amp;display=swap");

      :root {
        --main-color: #008000;
      }

      body {
        font-family: "Poppins", sans-serif;
      }

      .tail-container {
        background-color: #00ff1511;
      }
    </style>

    <script>
      tailwind.config = {
        content: [],
        theme: {
          extend: {
            colors: {
              main: "#008000",
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="min-h-screen flex items-center justify-center flex-col gap-8 bg-gray-50 py-8 px-4"
  >
    <!-- Container Principal -->
    <div
      class="tail-container w-full max-w-lg mx-auto p-8 rounded-2xl shadow-[5px_5px_9px_rgba(0,0,0,0.1)] flex flex-col gap-8 relative"
    >
      <h2 class="text-2xl font-semibold text-center text-gray-800">
        Cálculo do Combustível
      </h2>

      <div
        class="flex flex-col lg:flex-row items-start lg:items-center gap-8 lg:gap-10"
      >
        <!-- Input Distância -->
        <div class="flex-1 w-full">
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Distância</label
          >
          <div class="flex">
            <input
              type="number"
              placeholder="0"
              class="distance_input flex-1 border-3 border-[#e7e8ed] focus:border-[#008000] outline-none px-4 py-3 text-lg rounded-l-xl"
            />
            <div
              class="bg-[#e7e8ed] px-5 flex items-center font-medium rounded-r-xl"
            >
              km
            </div>
          </div>
        </div>

        <!-- Checkbox Ida e Volta -->
        <label
          class="twoTravelLabel flex items-center gap-2 text-sm font-medium text-gray-700 cursor-pointer absolute lg:static top-[145px] lg:top-auto"
        >
          <input
            type="checkbox"
            id="twoTravel"
            class="w-4 h-4 accent-[#008000]"
          />
          Ida e Volta
        </label>
      </div>

      <!-- Input Consumo -->
      <div class="w-full">
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Consumo Médio do Veículo</label
        >
        <div class="flex">
          <input
            type="number"
            placeholder="0"
            class="vehicle_input flex-1 border-3 border-[#e7e8ed] focus:border-[#008000] outline-none px-4 py-3 text-lg rounded-l-xl"
          />
          <div
            class="bg-[#e7e8ed] px-5 flex items-center font-medium rounded-r-xl"
          >
            km/L
          </div>
        </div>
      </div>

      <!-- Input Preço -->
      <div class="w-full">
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Preço por Litro</label
        >
        <div class="flex">
          <input
            type="text"
            placeholder="0,00"
            class="price_input flex-1 border-3 border-[#e7e8ed] focus:border-[#008000] outline-none px-4 py-3 text-lg rounded-l-xl"
          />
          <div
            class="bg-[#e7e8ed] px-5 flex items-center font-medium rounded-r-xl"
          >
            L
          </div>
        </div>
      </div>

      <!-- Botões -->
      <div class="flex items-center gap-6 mt-4">
        <button
          class="calculateButton bg-[#008000] hover:bg-[#006600] transition-all text-white font-medium text-xl px-10 py-4 rounded-xl w-full lg:w-auto"
        >
          Calcular
        </button>
        <a
          href="#"
          class="resetLink text-[#008000] hover:text-[#00ac00] font-bold text-lg transition-colors"
        >
          Limpar
        </a>
      </div>
    </div>

    <!-- Container de Resultado -->
    <div
      class="result_container hidden w-full max-w-lg mx-auto p-8 rounded-2xl shadow-[5px_5px_9px_rgba(0,0,0,0.1)] bg-white relative flex flex-col gap-6 tail-container"
    >
      <button
        class="closeBtn absolute top-6 right-6 w-10 h-10 bg-[#008000] text-white font-bold rounded-full hover:opacity-80 transition-all flex items-center justify-center text-xl"
      >
        ✕
      </button>

      <h2 class="calc_title text-2xl font-semibold text-center">Meu Cálculo</h2>

      <div class="results_area grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div
          class="result_area bg-white border-2 border-[#eee] rounded-xl p-4 flex items-center"
        >
          <p class="distance_description text-gray-700"></p>
        </div>
        <div
          class="result_area bg-white border-2 border-[#eee] rounded-xl p-4 flex items-center"
        >
          <p class="vehicle_description text-gray-700"></p>
        </div>
        <div
          class="result_area bg-white border-2 border-[#eee] rounded-xl p-4 flex items-center col-span-1 sm:col-span-2"
        >
          <p class="price_description text-gray-700">
            Preço do Combustível por Litro:
          </p>
        </div>
        <div
          class="result_area bg-white border-2 border-[#eee] rounded-xl p-4 flex items-center col-span-1 sm:col-span-2"
        >
          <p class="check_description text-gray-700"></p>
        </div>
      </div>

      <h2 class="result_title text-xl font-medium text-center mt-2">
        Resultado
      </h2>

      <table
        class="custom-table w-full border-collapse bg-white border border-[#ddd] shadow-sm rounded-xl overflow-hidden text-center"
      >
        <thead>
          <tr class="bg-[#f7f7f7]">
            <th class="py-4 px-6 font-bold border border-[#ddd]">Km</th>
            <th class="py-4 px-6 font-bold border border-[#ddd]">Consumo</th>
            <th class="py-4 px-6 font-bold border border-[#ddd]">Preço</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td
              class="distance_result py-5 px-6 border border-[#ddd] text-lg"
            ></td>
            <td
              class="vehicle_result py-5 px-6 border border-[#ddd] text-lg"
            ></td>
            <td
              class="price_result py-5 px-6 border border-[#ddd] text-lg"
            ></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Script original deve ser mantido aqui -->
    <script src="script.js"></script>

    <!-- Script para inicializar Tailwind (opcional, mas recomendado) -->
    <script>
      // Se precisar de mais customizações, pode adicionar aqui
    </script>
  </body>
</html>
